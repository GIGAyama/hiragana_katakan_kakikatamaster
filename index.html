<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ひらがな・カタカナかきかたマスター</title>

  <!-- Tailwind CSS（CDN） -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 教科書体フォント：Windows10+ は UDデジタル教科書体（バンドル）、
       それ以外は Google Fonts の Klee One（教科書体スタイル）にフォールバック -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">

  <!-- React 18 + ReactDOM 18（UMD CDN） -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel（ブラウザ上でJSXを変換） -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
      background-color: rgb(255 251 235 / 0.4); /* amber-50/40 のフォールバック */
      font-family: 'UD デジタル 教科書体 N-R', 'UD Digi Kyokasho N-R', 'UD デジタル 教科書体 NK-R', 'UD Digi Kyokasho NK-R', 'Klee One', 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
      font-weight: 600;
      color: #334155;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea { -webkit-user-select: auto; user-select: auto; }
    /* スクロールバーをスマートに */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #fcd34d80; border-radius: 4px; }
    /* range スライダー */
    input[type=range] { height: 8px; }
  </style>
</head>
<body>
  <!-- ローディング表示（Babel変換中の数百ms） -->
  <div id="root">
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#f59e0b;font-weight:900;font-size:1.25rem;">
      よみこみちゅう...
    </div>
  </div>

  <!-- App.jsx を Babel で変換しながら読み込み -->
  <script type="text/babel" data-type="module" data-presets="react" src="./App.jsx"></script>
</body>
</html>
